                    "Heaps: Top-K elements, merge K sorted lists, find median from data stream",
                  weight: 3,
                  level: "Heaps",
                },
                {
                  id: "dsa-13",
                  title:
                    "Greedy: interval scheduling, jump game, fractional knapsack, meeting rooms",
                  weight: 3,
                  level: "Greedy",
                },
                {
                  id: "dsa-14",
                  title:
                    "1D DP: climbing stairs, coin change, LIS, house robber, word break",
                  weight: 3,
                  level: "DP",
                },
                {
                  id: "dsa-15",
                  title:
                    "2D DP: 0/1 knapsack, LCS, edit distance, unique paths, matrix chain mult",
                  weight: 3,
                  level: "DP",
                },
                {
                  id: "dsa-16",
                  title: "Interval & Tree DP, partition DP, digit DP",
                  weight: 2,
                  level: "Adv DP",
                },
              ],
              resources: [
                { name: "NeetCode DP", url: "https://neetcode.io/practice" },
                {
                  name: "Striver's DP Playlist",
                  url: "https://takeuforward.org/",
                },
              ],
            },
          ],
        },
        {
          id: "phase3",
          title: "Phase 3 — Mock Interviews + Polish",
          subtitle: "Weeks 18–21 (June → Placements)",
          color: "purple",
          modules: [
            {
              id: "polish",
              title: "Interview Prep",
              icon: "fa-user-tie",
              topics: [
                {
                  id: "int-1",
                  title:
                    "Project deep dives: Synq (588K rows/sec), FastPeer arch, FastTask WebSocket, FastDrive Azure Blob",
                  weight: 3,
                  level: "Projects",
                },
                {
                  id: "int-2",
                  title:
                    "Mock Interviews: Pramp, Interviewing.io — minimum 10 full sessions before placements",
                  weight: 3,
                  level: "Mocks",
                },
                {
                  id: "int-3",
                  title:
                    "Weekly timed Leetcode contests (simulate OA pressure)",
                  weight: 3,
                  level: "Practice",
                },
                {
                  id: "int-4",
                  title:
                    "Behavioral STAR format: 5 stories covering challenge, conflict, leadership, failure, growth",
                  weight: 3,
                  level: "HR",
                },
                {
                  id: "int-5",
                  title:
                    "Java + Spring Boot mock Q&A: 25 most-asked questions drill (GC, JVM, N+1, bean lifecycle)",
                  weight: 3,
                  level: "Projects",
                },
                {
                  id: "int-6",
                  title:
                    "System Design 45-min mock format: Requirements → Estimation → Design → Deep-dive → Trade-offs",
                  weight: 3,
                  level: "Mocks",
                },
                {
                  id: "int-7",
                  title:
                    "LLD 30-min mock format: requirements → class diagram on paper → code skeleton → review",
                  weight: 3,
                  level: "Mocks",
                },
                {
                  id: "int-8",
                  title:
                    "Time & space complexity: amortized analysis, Master theorem, recurrence solving",
                  weight: 2,
                  level: "Practice",
                },
                {
                  id: "int-9",
                  title:
                    "OA strategy: time-boxing per problem, partial scoring, brute-force-first → optimize",
                  weight: 2,
                  level: "Practice",
                },
                {
                  id: "int-10",
                  title:
                    "Resume-driven technical Qs: explain every metric and decision on your resume (Synq numbers, N8N automation, partitioning choices)",
                  weight: 3,
                  level: "HR",
                },
              ],
              resources: [
                {
                  name: "Tech Interview Handbook",
                  url: "https://www.techinterviewhandbook.org/",
                },
                { name: "Pramp", url: "https://www.pramp.com/" },
                { name: "Interviewing.io", url: "https://interviewing.io/" },
              ],
            },
          ],
        },
      ];
      /**
       * --- STATE MANAGEMENT ---
       */
      const AppState = {
        isAuthenticated: localStorage.getItem("roadmap_auth") === "true",
        progress: JSON.parse(localStorage.getItem("roadmap_progress") || "{}"),

        saveProgress() {
          localStorage.setItem(
            "roadmap_progress",
            JSON.stringify(this.progress),
          );
        },

        toggleTask(taskId) {
          this.progress[taskId] = !this.progress[taskId];
          this.saveProgress();
          UI.updateStats();
        },

        getStats() {
          let totalTasks = 0;
          let completedTasks = 0;
          let totalWeight = 0;
          let completedWeight = 0;

          roadmapData.forEach((phase) => {
            phase.modules.forEach((mod) => {
              mod.topics.forEach((topic) => {
                totalTasks++;
                totalWeight += topic.weight;
                if (this.progress[topic.id]) {
                  completedTasks++;
                  completedWeight += topic.weight;
                }
              });
            });
          });

          const percentage =
            totalWeight === 0
              ? 0
              : Math.round((completedWeight / totalWeight) * 100);

          let mastery = "Novice";
          if (percentage > 25) mastery = "Apprentice";
          if (percentage > 50) mastery = "Practitioner";
          if (percentage > 75) mastery = "Expert";
          if (percentage === 100) mastery = "Master";

          return {
            totalTasks,
            completedTasks,
            totalWeight,
            completedWeight,
            percentage,
            mastery,
          };
        },

        getModuleStats(moduleId) {
          let total = 0;
          let completed = 0;

          roadmapData.forEach((phase) => {
            const mod = phase.modules.find((m) => m.id === moduleId);
            if (mod) {
              mod.topics.forEach((t) => {
                total += t.weight;
                if (this.progress[t.id]) completed += t.weight;
              });
            }
          });
          const percentage =
            total === 0 ? 0 : Math.round((completed / total) * 100);
          return { total, completed, percentage };
        },
      };

      /**
       * --- UI LOGIC ---
       */
      const UI = {
        init() {
          this.cacheDOM();
          this.bindEvents();

          if (AppState.isAuthenticated) {
            this.showDashboard();
          } else {
            this.showLogin();
          }
        },

        cacheDOM() {
          this.loginScreen = document.getElementById("login-screen");
          this.dashboard = document.getElementById("dashboard");
          this.loginForm = document.getElementById("login-form");
          this.loginError = document.getElementById("login-error");
          this.logoutBtn = document.getElementById("logout-btn");
          this.roadmapContainer = document.getElementById("roadmap-container");
          this.sidebarNav = document.getElementById("sidebar-nav");
          this.searchInput = document.getElementById("search-input");
          this.emptyState = document.getElementById("empty-state");
          this.mobileMenuBtn = document.getElementById("mobile-menu-btn");
          this.sidebar = document.querySelector("aside");
          this.mobileOverlay = document.getElementById("mobile-overlay");

          // Stats
          this.statTotalTasks = document.getElementById("stat-total-tasks");
          this.statCompletedPoints = document.getElementById(
            "stat-completed-points",
          );
          this.statTotalPoints = document.getElementById("stat-total-points");
          this.statMastery = document.getElementById("stat-mastery");
          this.sidebarProgressRing = document.getElementById(
            "sidebar-progress-ring",
          );
          this.sidebarProgressText = document.getElementById(
            "sidebar-progress-text",
          );
        },

        bindEvents() {
          this.loginForm.addEventListener("submit", (e) => {
            e.preventDefault();
            const user = document.getElementById("username").value;
            const pass = document.getElementById("password").value;

            if (user === "admin" && pass === "admin") {
              localStorage.setItem("roadmap_auth", "true");
              AppState.isAuthenticated = true;
              this.showDashboard();
            } else {
              this.loginError.classList.remove("hidden");
              setTimeout(() => this.loginError.classList.add("hidden"), 3000);
            }
          });

          this.logoutBtn.addEventListener("click", () => {
            localStorage.removeItem("roadmap_auth");
            AppState.isAuthenticated = false;
            document.getElementById("password").value = "";
            this.showLogin();
          });

          // Event delegation for checkboxes and accordions
          this.roadmapContainer.addEventListener("click", (e) => {
            // Checkbox logic
            if (e.target.classList.contains("task-checkbox")) {
              const taskId = e.target.dataset.id;
              AppState.toggleTask(taskId);
              this.updateModuleProgressUI(e.target.dataset.module);
            }

            // Copy single topic to prompt
            const copyTopicBtn = e.target.closest(".copy-topic-btn");
            if (copyTopicBtn) {
              e.preventDefault();
              e.stopPropagation();
              const title = copyTopicBtn.dataset.topicTitle;
              const level = copyTopicBtn.dataset.topicLevel;
              const moduleTitle = copyTopicBtn.dataset.moduleTitle;
              const topicList = `1. ${title} (${level})`;
              const prompt = buildPrompt(moduleTitle, topicList);
              navigator.clipboard.writeText(prompt).then(() => {
                const short =
                  title.length > 45 ? title.substring(0, 45) + "…" : title;
                this.showCopyToast(`"${short}" copied!`);
              });
              return;
            }

            // Copy all pending topics in a module to prompt
            const copySubjectBtn = e.target.closest(".copy-subject-btn");
            if (copySubjectBtn) {
              e.preventDefault();
              e.stopPropagation();
              const moduleId = copySubjectBtn.dataset.moduleId;
              let targetModule = null;
              for (const phase of roadmapData) {
                targetModule = phase.modules.find((m) => m.id === moduleId);
                if (targetModule) break;
              }
              if (!targetModule) return;
              const pendingTopics = targetModule.topics.filter(
                (t) => !AppState.progress[t.id],
              );
              if (pendingTopics.length === 0) {
                this.showCopyToast("All topics already completed! 🎉");
                return;
              }
              const topicList = pendingTopics
                .map((t, i) => `${i + 1}. ${t.title} (${t.level})`)
                .join("\n");
              const prompt = buildPrompt(targetModule.title, topicList);
              navigator.clipboard.writeText(prompt).then(() => {
                this.showCopyToast(
                  `${pendingTopics.length} topics from "${targetModule.title}" copied!`,
                );
              });
              return;
            }

            // Accordion logic
            const header = e.target.closest(".accordion-header");
            if (header) {
              const contentId = header.dataset.target;
              const content = document.getElementById(contentId);
              const icon = header.querySelector(".accordion-icon");

              content.classList.toggle("expanded");
              icon.classList.toggle("expanded-icon");
            }
          });

          // Search logic
          this.searchInput.addEventListener("input", (e) =>
            this.handleSearch(e.target.value),
          );

          // Keyboard shortcuts
          document.addEventListener("keydown", (e) => {
            if (e.key === "/" && document.activeElement !== this.searchInput) {
              e.preventDefault();
              this.searchInput.focus();
            } else if (
              e.key === "Escape" &&
              document.activeElement === this.searchInput
            ) {
              this.searchInput.blur();
              this.searchInput.value = "";
              this.handleSearch("");
            }
          });

          // Mobile Menu
          this.mobileMenuBtn.addEventListener("click", () => {
            this.sidebar.classList.toggle("hidden");
            this.sidebar.classList.add("absolute", "z-40", "h-full");
            this.mobileOverlay.classList.remove("hidden");
          });

          this.mobileOverlay.addEventListener("click", () => {
            this.sidebar.classList.add("hidden");
            this.sidebar.classList.remove("absolute", "z-40", "h-full");
            this.mobileOverlay.classList.add("hidden");
          });
        },

        showLogin() {
          this.dashboard.classList.add("hidden");
          this.loginScreen.classList.remove("hidden");
        },

        showDashboard() {
          this.loginScreen.classList.add("hidden");
          this.dashboard.classList.remove("hidden");
          this.renderRoadmap();
          this.renderSidebarNav();
          this.updateStats();
        },

        getColorClasses(colorName) {
          const map = {
            blue: {
              text: "text-blue-400",
              bg: "bg-blue-500/10",
              border: "border-blue-500/30",
              bar: "bg-blue-500",
            },
            emerald: {
              text: "text-emerald-400",
              bg: "bg-emerald-500/10",
              border: "border-emerald-500/30",
              bar: "bg-emerald-500",
            },
            purple: {
              text: "text-purple-400",
              bg: "bg-purple-500/10",
              border: "border-purple-500/30",
              bar: "bg-purple-500",
            },
          };
          return map[colorName] || map.blue;
        },

        renderRoadmap() {
          this.roadmapContainer.innerHTML = "";

          roadmapData.forEach((phase, pIndex) => {
            const colors = this.getColorClasses(phase.color);

            const phaseEl = document.createElement("div");
            phaseEl.className = "phase-section fade-in";
            phaseEl.style.animationDelay = `${pIndex * 0.1}s`;
            phaseEl.id = `nav-${phase.id}`;

            let html = `
                <div class="mb-6">
                    <h2 class="text-2xl font-bold text-white flex items-center">
                        <span class="w-2 h-8 rounded-full ${colors.bar} mr-3"></span>
                        ${phase.title}
                    </h2>
                    <p class="text-gray-400 ml-5 mt-1 text-sm font-medium tracking-wide uppercase">${phase.subtitle}</p>
                </div>
                <div class="grid grid-cols-1 gap-4">
            `;

            phase.modules.forEach((mod) => {
              const modStats = AppState.getModuleStats(mod.id);

              html += `
                    <div class="bg-gray-900 border border-gray-800 rounded-xl overflow-hidden search-module" data-search="${mod.title.toLowerCase()} ${mod.topics.map((t) => t.title.toLowerCase()).join(" ")}">
                        <!-- Accordion Header -->
                        <div class="accordion-header p-5 cursor-pointer hover:bg-gray-800/50 transition-colors flex items-center justify-between select-none" data-target="content-${mod.id}">
                            <div class="flex items-center space-x-4 flex-1">
                                <div class="w-10 h-10 rounded-lg ${colors.bg} ${colors.text} flex items-center justify-center text-lg">
                                    <i class="fa-solid ${mod.icon}"></i>
                                </div>
                                <div class="flex-1">
                                    <h3 class="text-lg font-semibold text-gray-100">${mod.title}</h3>
                                    <div class="flex items-center mt-2 w-full max-w-md">
                                        <div class="flex-1 h-1.5 bg-gray-800 rounded-full overflow-hidden">
                                            <div id="bar-${mod.id}" class="h-full ${colors.bar} transition-all duration-500 ease-out" style="width: ${modStats.percentage}%"></div>
                                        </div>
                                        <span id="text-${mod.id}" class="text-xs text-gray-400 ml-3 font-medium min-w-[3rem]">${modStats.percentage}%</span>
                                    </div>
                                </div>
                            </div>
                            <button class="copy-subject-btn flex-shrink-0 ml-2 p-2 rounded text-gray-500 hover:text-brand-500 hover:bg-gray-700 transition-colors"
                                    data-module-id="${mod.id}"
                                    title="Copy pending topics to prompt">
                                <i class="fa-solid fa-list-check text-sm"></i>
                            </button>
                            <div class="ml-2 text-gray-500">
                                <i class="fa-solid fa-chevron-down accordion-icon"></i>
                            </div>
                        </div>

                        <!-- Accordion Content -->
                        <div id="content-${mod.id}" class="accordion-content border-t border-gray-800/50 bg-gray-900/50">
                            <div class="p-5">
                                <div class="space-y-3">
                `;

              mod.topics.forEach((topic) => {
                const isChecked = AppState.progress[topic.id] ? "checked" : "";
                const levelColors =
                  topic.level.includes("L1") || topic.level.includes("Core")
                    ? "text-red-400 bg-red-400/10 border-red-400/20"
                    : topic.level.includes("L2") ||
                        topic.level.includes("Patterns")
                      ? "text-yellow-400 bg-yellow-400/10 border-yellow-400/20"
                      : "text-blue-400 bg-blue-400/10 border-blue-400/20";

                html += `
                        <label class="flex items-start group cursor-pointer p-3 rounded-lg hover:bg-gray-800 transition-colors border border-transparent hover:border-gray-700">
                            <div class="flex-shrink-0 mt-0.5">
                                <input type="checkbox" class="checkbox-custom task-checkbox" data-id="${topic.id}" data-module="${mod.id}" data-weight="${topic.weight}" ${isChecked}>
                            </div>
                            <div class="ml-3 flex-1 flex items-start justify-between gap-2">
                                <div class="flex-1">
                                    <p class="text-sm font-medium ${isChecked ? "text-gray-500 line-through" : "text-gray-200"} transition-colors duration-200 task-text-${topic.id}">${topic.title}</p>
                                    <span class="inline-block mt-1.5 px-2 py-0.5 rounded text-[10px] font-semibold border ${levelColors}">${topic.level} &bull; ${topic.weight} pt${topic.weight > 1 ? "s" : ""}</span>
                                </div>
                                <button class="copy-topic-btn flex-shrink-0 mt-0.5 p-1.5 rounded opacity-100 md:opacity-0 md:group-hover:opacity-100 transition-opacity text-gray-500 hover:text-brand-500 hover:bg-gray-700"
                                  data-topic-title="${topic.title.replace(/"/g, "&quot;")}"
                                  data-topic-level="${topic.level}"
                                  data-module-title="${mod.title.replace(/"/g, "&quot;")}"
                                  title="Copy topic to prompt">
                                    <i class="fa-regular fa-copy text-xs"></i>
                                </button>
                            </div>
                        </label>
                    `;
              });

              html += `</div>`;

              // Resources
              if (mod.resources && mod.resources.length > 0) {
                html += `
                        <div class="mt-5 pt-4 border-t border-gray-800">
                            <p class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3">Resources</p>
                            <div class="flex flex-wrap gap-2">
                    `;
                mod.resources.forEach((res) => {
                  html += `
                            <a href="${res.url}" class="inline-flex items-center px-3 py-1.5 rounded-md bg-gray-800 text-xs font-medium text-gray-300 hover:bg-gray-700 hover:text-white transition-colors border border-gray-700">
                                <i class="fa-solid fa-link mr-1.5 text-gray-500"></i> ${res.name}
                            </a>
                        `;
                });
                html += `</div></div>`;
              }

              html += `
                            </div>
                        </div>
                    </div>
                `;
            });

            html += `</div>`;
            phaseEl.innerHTML = html;
            this.roadmapContainer.appendChild(phaseEl);
          });
        },

        renderSidebarNav() {
          this.sidebarNav.innerHTML = "";
          roadmapData.forEach((phase) => {
            const a = document.createElement("a");
            a.href = `#nav-${phase.id}`;
            a.className =
              "flex items-center px-4 py-2 text-sm font-medium text-gray-300 rounded-lg hover:bg-gray-800 hover:text-white transition-colors group";
            a.innerHTML = `
                <span class="w-1.5 h-1.5 rounded-full bg-${phase.color}-500 mr-3 opacity-70 group-hover:opacity-100"></span>
                ${phase.title.split("—")[0].trim()}
            `;
            // Smooth scroll
            a.addEventListener("click", (e) => {
              e.preventDefault();
              const target = document.getElementById(`nav-${phase.id}`);
              const scrollArea = document.getElementById("main-scroll-area");
              scrollArea.scrollTo({
                top: target.offsetTop - 80, // Offset for header
                behavior: "smooth",
              });
              // Close mobile menu if open
              if (
                !this.sidebar.classList.contains("hidden") &&
                window.innerWidth < 768
              ) {
                this.sidebar.classList.add("hidden");
                this.mobileOverlay.classList.add("hidden");
              }
            });
            this.sidebarNav.appendChild(a);
          });
        },

        updateModuleProgressUI(moduleId) {
          const stats = AppState.getModuleStats(moduleId);
          const bar = document.getElementById(`bar-${moduleId}`);
          const text = document.getElementById(`text-${moduleId}`);

          if (bar && text) {
            bar.style.width = `${stats.percentage}%`;
            text.innerText = `${stats.percentage}%`;
          }

          // Strikethrough logic is handled via CSS classes, just need to toggle it
          const checkboxes = document.querySelectorAll(
            `input[data-module="${moduleId}"]`,
          );
          checkboxes.forEach((cb) => {
            const textEl = document.querySelector(
              `.task-text-${cb.dataset.id}`,
            );
            if (cb.checked) {
              textEl.classList.add("text-gray-500", "line-through");
              textEl.classList.remove("text-gray-200");
            } else {
              textEl.classList.remove("text-gray-500", "line-through");
              textEl.classList.add("text-gray-200");
            }
          });
        },

        updateStats() {
          const stats = AppState.getStats();

          // Update top panels
          this.statTotalTasks.innerText = stats.totalTasks;
          this.statCompletedPoints.innerText = stats.completedWeight;
          this.statTotalPoints.innerText = stats.totalWeight;
          this.statMastery.innerText = stats.mastery;

          // Update Circular Progress
          const circle = this.sidebarProgressRing;
          const radius = circle.r.baseVal.value;
          const circumference = radius * 2 * Math.PI;

          // Ensure stroke properties are set
          circle.style.strokeDasharray = `${circumference} ${circumference}`;

          const offset =
            circumference - (stats.percentage / 100) * circumference;
          circle.style.strokeDashoffset = offset;

          this.sidebarProgressText.innerText = `${stats.percentage}%`;
        },

        showCopyToast(message) {
          const toast = document.getElementById("copy-toast");
          const msg = document.getElementById("copy-toast-msg");
          msg.textContent = message;
          toast.classList.remove(
            "opacity-0",
            "pointer-events-none",
            "translate-y-2",
          );
          toast.classList.add("opacity-100", "translate-y-0");
          clearTimeout(this._toastTimer);
          this._toastTimer = setTimeout(() => {
            toast.classList.add(
              "opacity-0",
              "pointer-events-none",
              "translate-y-2",
            );
            toast.classList.remove("opacity-100", "translate-y-0");
          }, 2500);
        },

        handleSearch(query) {
          const term = query.toLowerCase().trim();
          const modules = document.querySelectorAll(".search-module");
          let visibleCount = 0;

          modules.forEach((mod) => {
            const searchableText = mod.dataset.search;
            if (searchableText.includes(term)) {
              mod.classList.remove("hidden");
              visibleCount++;

              // Auto expand if searching, collapse if empty
              const content = mod.querySelector(".accordion-content");
              const icon = mod.querySelector(".accordion-icon");
              if (term !== "") {
                content.classList.add("expanded");
                icon.classList.add("expanded-icon");
              } else {
                content.classList.remove("expanded");
                icon.classList.remove("expanded-icon");
              }
            } else {
              mod.classList.add("hidden");
            }
          });

          // Hide/Show phase headers if all modules inside are hidden
          const phases = document.querySelectorAll(".phase-section");
          phases.forEach((phase) => {
            const visibleModules = phase.querySelectorAll(
              ".search-module:not(.hidden)",
            );
            if (visibleModules.length === 0) {
              phase.classList.add("hidden");
            } else {
              phase.classList.remove("hidden");
            }
          });

          // Empty state
          if (visibleCount === 0) {
            this.emptyState.classList.remove("hidden");
            this.emptyState.classList.add("flex");
          } else {
            this.emptyState.classList.add("hidden");
            this.emptyState.classList.remove("flex");
          }
        },
      };

      // Initialize Application
      document.addEventListener("DOMContentLoaded", () => {
        UI.init();
      });
    </script>

    <!-- Copy Toast Notification -->
    <div
      id="copy-toast"
      class="fixed bottom-6 right-6 z-50 flex items-center gap-2 bg-gray-800 border border-gray-700 text-white text-sm px-4 py-2.5 rounded-lg shadow-xl opacity-0 pointer-events-none transition-all duration-300 translate-y-2"
    >
      <i class="fa-solid fa-check text-emerald-400 text-xs"></i>
      <span id="copy-toast-msg">Prompt copied!</span>
    </div>
  </body>
</html>
